name: CDN canary

# Runs ~12h after the Monday refresh so jsDelivr's s-maxage=43200 has had
# time to propagate. Independently surfaces CDN failure modes (jsDelivr
# down, edge propagation stuck, repo @main pin returning stale) that the
# refresh workflow itself cannot detect.

on:
  schedule:
    - cron: "0 22 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch index.json from jsDelivr
        run: |
          set -euo pipefail
          INDEX_URL="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/data/index.json"
          echo "Fetching $INDEX_URL"
          curl --fail --silent --show-error --max-time 30 -o /tmp/index.json "$INDEX_URL"

      - name: Validate index freshness
        run: |
          set -euo pipefail
          python <<'EOF'
          import json
          import sys
          from datetime import datetime, timezone

          d = json.load(open("/tmp/index.json"))
          assert d.get("schema_version") == 3, f"unexpected schema_version: {d.get('schema_version')!r}"
          ts = datetime.fromisoformat(d["refreshed_at"].replace("Z", "+00:00"))
          age_days = (datetime.now(timezone.utc) - ts).total_seconds() / 86400
          print(f"index.refreshed_at={d['refreshed_at']} (age {age_days:.1f}d)")
          if age_days > 9:
              print(f"FAIL: index stale, age {age_days:.1f}d > 9d grace window", file=sys.stderr)
              sys.exit(1)
          assert d["source"]["etag"], "source.etag empty"
          assert "states" in d and len(d["states"]) > 0, "states map empty"
          print(f"states={len(d['states'])} | source.publication_date={d['source']['publication_date']}")
          EOF

      - name: Spot-check Iowa Story corn point leaf
        run: |
          set -euo pipefail
          LEAF_URL="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/data/states/19/counties/169/corn.json"
          echo "Fetching $LEAF_URL"
          curl --fail --silent --show-error --max-time 30 -o /tmp/leaf.json "$LEAF_URL"
          python <<'EOF'
          import json
          import sys

          d = json.load(open("/tmp/leaf.json"))
          assert d["schema_version"] == 3
          assert d["state"]["fips"] == "19"
          assert d["county"]["code"] == "169"
          assert d["commodity"]["slug"] == "corn"
          # v3 leaves carry one canonical series per statistic; pick YIELD.
          yield_canon = [s for s in d["series"]
                         if s.get("canonical") and s.get("statistic") == "YIELD"]
          if not yield_canon:
              print("FAIL: no canonical YIELD series in Story corn leaf", file=sys.stderr)
              sys.exit(1)
          unit = yield_canon[0]["unit"]
          assert unit == "BU / ACRE", f"unexpected canonical yield unit: {unit!r}"
          print(f"canonical YIELD unit={unit} | total series={len(d['series'])}")
          EOF

      - name: Spot-check planting-window shards (FIE-41 acceptance c)
        env:
          BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/data
        run: |
          set -euo pipefail
          # Drive the check off the producer's own coverage manifest instead of
          # hardcoded FIPS: which (state, crop) shards exist changes year to year
          # as states cross the min-usable-years threshold, so a fixed list rots
          # (it asserted 39/corn, which the producer never emits, and was red for
          # weeks). PRESENT entries are the shards the run actually wrote;
          # cross-check a sample of them, and confirm an OMITTED one is absent.
          curl --fail --silent --show-error --max-time 30 \
            -o /tmp/coverage.json "$BASE/_audit/window-coverage.json"
          python <<'EOF'
          import json, os, re, sys
          from urllib.request import urlopen, Request
          from urllib.error import HTTPError

          BASE = os.environ["BASE"]

          def fetch(url):
              return urlopen(Request(url, headers={"User-Agent": "canary"}), timeout=30)

          cov = json.load(open("/tmp/coverage.json"))
          cands = cov.get("candidates", {})
          present = sorted(k for k, v in cands.items() if v.get("status") == "PRESENT")
          omitted = sorted(k for k, v in cands.items() if v.get("status") == "OMITTED")
          print(f"coverage: {len(present)} PRESENT, {len(omitted)} OMITTED")

          # Floor, not an exact count: catches the real failure (producer emits
          # ~nothing) without flaking when coverage shifts by a state or two.
          FLOOR = 10
          if len(present) < FLOOR:
              print(f"FAIL: only {len(present)} PRESENT shards (< {FLOOR})", file=sys.stderr)
              sys.exit(1)

          # Shape-check a deterministic sample of shards the producer says exist.
          for key in present[:3]:
              fips, crop = key.split("/")
              d = json.load(fetch(f"{BASE}/planting-windows/{key}.json"))
              assert d["stateFips"] == fips, (key, d.get("stateFips"))
              assert d["crop"] == crop, (key, d.get("crop"))
              assert d["method"] == "nass-crop-progress-percentile", key
              assert "schema_version" not in d, f"{key} carries schema_version"
              for blk in ("plant", "harvest"):
                  for f in ("begin", "mostActiveStart", "mostActiveEnd", "end"):
                      assert re.match(r"^[0-9]{2}-[0-9]{2}$", d[blk][f]), (key, blk, f, d[blk][f])
              print(f"{key} OK plant.begin={d['plant']['begin']} end={d['plant']['end']}")

          # An OMITTED candidate must genuinely not be served (validates the
          # omit path, and that we are not silently 200-ing on everything).
          if omitted:
              key = omitted[0]
              try:
                  fetch(f"{BASE}/planting-windows/{key}.json")
                  print(f"FAIL: OMITTED {key} is unexpectedly served", file=sys.stderr)
                  sys.exit(1)
              except HTTPError as e:
                  assert e.code >= 400, (key, e.code)
                  print(f"{key} correctly absent (HTTP {e.code})")
          EOF

      - name: Ping healthchecks (best-effort)
        if: success()
        env:
          PING_URL: ${{ secrets.HEALTHCHECKS_CANARY_PING_URL }}
        run: |
          if [ -z "${PING_URL:-}" ]; then
            echo "HEALTHCHECKS_CANARY_PING_URL not set; skipping ping."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 10 "$PING_URL" || echo "WARN: canary ping failed (non-blocking)"
