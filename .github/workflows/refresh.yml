name: NASS bulk refresh

# NASS publishes business-daily ~03:13 ET. 09:17 UTC works year-round (covers
# both EDT and EST without ever firing before NASS publishes).
#
# Healthchecks.io is configured with grace=9d, alert on 2 consecutive misses.
# Single-Monday GitHub cron drops auto-recover the next week; alerting on the
# first miss would page on benign drops.
on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run tests
        # Catch a broken refresher before we run it against live NASS data.
        # The cron is the only place this script executes in production, so
        # CI for this repo lives inside the same job as the refresh.
        run: python -m unittest tests.test_refresh -v

      - name: Run refresh
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: python scripts/refresh.py

      - name: Commit and push
        run: |
          git config user.name "nass-cache-bot"
          git config user.email "nass-cache-bot@users.noreply.github.com"
          git add data/v1 data/v2 .refresh-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(python -c "import json; print(json.load(open('.refresh-state.json'))['last_successful_date'])")
          git commit -m "snapshot ${DATE}"
          git push origin HEAD
